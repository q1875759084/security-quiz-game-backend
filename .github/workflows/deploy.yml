name: CI/CD 自动部署

# 镜像管理策略（同前端）：
#   一次构建原则：测试用 sha tag，生产给同一个 sha 镜像追加语义版本 tag
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ==================== CI：代码校验 ====================
  ci:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node 版本
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 类型检查
        run: npm run type-check

      - name: 构建校验
        run: npm run build

  # ==================== CD：测试环境部署 ====================
  deploy-dev:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      # CI 校验（workflow_dispatch 不触发 ci job，在此补充）
      - name: 设置 Node 版本
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 类型检查
        run: npm run type-check

      - name: 构建校验
        run: npm run build

      - name: 生成镜像标签
        id: meta
        run: echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 构建 Docker 镜像
        run: docker build -t security-quiz-game-backend:${{ steps.meta.outputs.SHA_TAG }} .

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: 推送镜像到 Docker Hub（sha tag）
        run: |
          docker tag security-quiz-game-backend:${{ steps.meta.outputs.SHA_TAG }} ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game-backend:${{ steps.meta.outputs.SHA_TAG }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game-backend:${{ steps.meta.outputs.SHA_TAG }}

      - name: 触发 infra 仓库部署后端（测试环境）
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: deploy-backend
          client-payload: |
            {
              "image_tag": "${{ steps.meta.outputs.SHA_TAG }}",
              "environment": "dev"
            }

  # ==================== CD：生产环境部署 ====================
  deploy-prod:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: 生成镜像标签
        id: meta
        run: |
          echo "VERSION_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: 给 sha 镜像追加语义版本 tag
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game-backend:${{ steps.meta.outputs.VERSION_TAG }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game-backend:${{ steps.meta.outputs.SHA_TAG }}

      - name: 触发 infra 仓库部署后端（生产环境）
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: deploy-backend
          client-payload: |
            {
              "image_tag": "${{ steps.meta.outputs.VERSION_TAG }}",
              "environment": "prod"
            }
